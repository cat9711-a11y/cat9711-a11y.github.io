<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume | Joowon Lee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4f5f8;
        --surface: #fff;
        --ink: #161d2a;
        --ink-soft: #5e6677;
        --line: #d8deea;
        --accent: #284e9a;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Noto Sans KR", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }
      main {
        width: min(720px, 92%);
        margin: 60px auto;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 30px 24px;
        text-align: center;
      }
      h1 {
        margin-top: 0;
        margin-bottom: 8px;
        font-family: "Manrope", sans-serif;
      }
      p {
        margin: 0 0 14px;
        color: var(--ink-soft);
        line-height: 1.65;
      }
      a {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Resume</h1>
      <p>
        This is a temporary placeholder page. You can replace it with your full PDF
        resume at any time.
      </p>
      <p>
        Upload your PDF to the site root and change the links in
        <code>index.html</code> from <code>resume.html</code> to
        <code>resume.pdf</code>.
      </p>
      <a href="./index.html">Back to Home</a>
    </main>
  </body>
</html>
